services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinqo-bot
    env_file:
      - .env
    environment:
      API_BASE_URL: ${BOT_API_BASE_URL:-http://host.docker.internal:8000/api/v1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    restart: unless-stopped
